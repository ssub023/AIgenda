<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIgenda - Ultra Modern Workspace</title>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader-ring"></div>
        <div class="loading-text">AI가 회의록을 분석하고 있습니다...</div>
    </div>

    <div class="bg-mesh"><div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div></div>

    <header class="top-navbar">
        <div class="logo-wrap"><div class="logo">AIgenda</div></div>
        <input type="text" class="global-search" placeholder="전체 워크스페이스 검색...">
        <div class="top-actions">
            <button class="btn-icon" id="theme-toggle" onclick="toggleDarkMode()" title="다크모드 전환">
                <svg id="theme-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <input type="file" id="fileInput" accept="audio/*,video/*" style="display: none;" onchange="handleFileUpload(event)">
            <button class="btn-new" onclick="document.getElementById('fileInput').click()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>새 회의 녹음
            </button>
        </div>
    </header>

    <main class="app-container">
        <aside class="left-panel">
            <div class="panel-header">회의 기록 보관함 <span id="meeting-count" style="font-size: 1rem; color: #8b5cf6; font-weight: 800; background: #f3f0ff; padding: 0.3rem 0.8rem; border-radius: 20px;">0건</span></div>
            <div class="meeting-list" id="meeting-list"></div>
        </aside>
        <section class="right-panel">
            <div class="workspace-header" id="workspace-header">
                <div id="ws-meta" class="ws-meta"></div>
                <h2 id="ws-title" class="ws-title"></h2>
                <div class="tabs" id="ws-tabs">
                    <button class="tab-btn active" onclick="switchTab('summary')">요약 리포트</button>
                    <button class="tab-btn" onclick="switchTab('transcript')">전체 기록</button>
                </div>
            </div>
            <div class="workspace-content" id="workspace-content">
                <div style="text-align:center; padding-top: 6rem; color: var(--text-muted); font-size: 1.3rem;">우측 상단의 <b>'+ 새 회의 녹음'</b> 버튼을 눌러 오디오 파일을 업로드해보세요.</div>
            </div>
        </section>
    </main>

    <script>
        function toggleDarkMode() {
            const root = document.documentElement;
            const isDark = root.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            root.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(!isDark);
        }

        function updateThemeIcon(isDark) {
            const icon = document.getElementById('theme-icon');
            if (isDark) icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
            else icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
        }

        let meetingData = {};
        let currentMeetingId = null; 
        let currentTab = 'summary'; 

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('loadingOverlay').style.display = 'flex';
            const formData = new FormData();
            formData.append("file", file);

            try {
                const response = await fetch("/upload", { method: "POST", body: formData });
                if (!response.ok) throw new Error("분석 실패");
                
                const result = await response.json();
                const newId = 'meeting_' + Date.now();
                
                const cleanSummary = (result.summary || "요약 실패").replace(/\*/g, '').replace(/#/g, '').trim();
                const cleanDecisions = (result.decisions || "").replace(/#/g, '').trim();

                const bulletPoints = cleanDecisions.split('\n')
                    .map(line => line.replace(/^[-*+•]\s+/, '').trim())
                    .filter(line => line.length > 0);

                meetingData[newId] = { 
                    title: file.name.split('.')[0], 
                    meta: new Date().toLocaleDateString(), 
                    summary: cleanSummary, 
                    bullets: bulletPoints, 
                    diarized: result.diarized || [] 
                };
                
                document.getElementById('fileInput').value = '';
                selectMeeting(newId);
            } catch (e) { 
                alert("에러 발생: " + e.message); 
            } finally { 
                document.getElementById('loadingOverlay').style.display = 'none'; 
            }
        }

        function renderMeetingList() {
            const list = document.getElementById('meeting-list');
            const keys = Object.keys(meetingData).reverse(); 
            document.getElementById('meeting-count').innerText = `${keys.length}건`;
            list.innerHTML = keys.map(id => `
                <div class="meeting-item ${id === currentMeetingId ? 'active' : ''}" onclick="selectMeeting('${id}')">
                    <div class="m-title">${meetingData[id].title}</div>
                    <div class="m-meta">📅 ${meetingData[id].meta}</div>
                </div>`).join('');
        }

        function selectMeeting(id) {
            currentMeetingId = id;
            currentTab = 'summary'; 
            document.getElementById('workspace-header').style.display = 'block';
            renderMeetingList(); updateWorkspaceHeader(); renderWorkspace(); 
        }

        function updateWorkspaceHeader() {
            const m = meetingData[currentMeetingId];
            document.getElementById('ws-title').innerText = m.title;
            document.getElementById('ws-meta').innerText = `📅 업로드 일자: ${m.meta}`;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderWorkspace();
        }

        function renderWorkspace() {
            const content = document.getElementById('workspace-content');
            if (!currentMeetingId) return;
            const m = meetingData[currentMeetingId];
            
            if (currentTab === 'summary') {
                let summaryHtml = m.summary ? `<p>${m.summary.replace(/\n/g, '<br>')}</p>` : '요약 정보 없음';

                // 🚨 상세 결정 사항 가독성 파싱 로직 적용
                let decisionsHtml = m.bullets.map(b => {
                    let colonIndex = b.indexOf(':');
                    // 콜론(:)이 있고 이름이 15글자 이하일 때만 배지 형태로 파싱
                    if(colonIndex > -1 && colonIndex < 15) {
                        let speakerName = b.substring(0, colonIndex).trim();
                        let decisionText = b.substring(colonIndex + 1).trim();
                        return `
                        <div class="decision-item">
                            <span class="decision-badge">${speakerName}</span>
                            <span class="decision-text">${decisionText}</span>
                        </div>`;
                    } else {
                        return `
                        <div class="decision-item">
                            <span class="decision-icon">🎯</span>
                            <span class="decision-text">${b}</span>
                        </div>`;
                    }
                }).join('');

                if (!decisionsHtml) decisionsHtml = '<div class="decision-item">정보 없음</div>';

                content.innerHTML = `
                    <div class="summary-section">
                        <h3><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg> 회의 핵심 요약</h3>
                        <div class="summary-card">${summaryHtml}</div>
                    </div>
                    <div class="summary-section">
                        <h3><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> 상세 결정 사항</h3>
                        <div class="decision-list">${decisionsHtml}</div>
                    </div>`;
            } else {
                content.innerHTML = m.diarized.map(item => `
                    <div class="transcript-line">
                        <div class="ts-avatar">${item.speaker.replace(/[^0-9]/g, '') || "U"}</div>
                        <div class="ts-content">
                            <div class="ts-header"><span class="ts-name">${item.speaker}</span><span class="ts-time">${item.time}</span></div>
                            <div class="ts-text">${item.text}</div>
                        </div>
                    </div>`).join('');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('theme') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); updateThemeIcon(true); }
            renderMeetingList();
        });
    </script>
</body>
</html>
