<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIgenda - GPU Powered Workspace</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        * { box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }
        :root { 
            --bg-color: #f1f5f9; --text-main: #1e293b; --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.65); --glass-border: rgba(255, 255, 255, 0.6);
            --item-bg: rgba(255,255,255,0.4); --item-hover-bg: white;
            --card-bg: white; --card-border: #eef2f6;
            --gradient-main: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%);
        }
        body { margin: 0; height: 100vh; color: var(--text-main); background-color: var(--bg-color); overflow: hidden; display: flex; flex-direction: column; }
        .bg-mesh { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; }
        .blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.3; animation: float 12s infinite alternate ease-in-out; }
        .blob1 { width: 40vw; height: 40vw; background: #3b82f6; top: -10vh; left: -10vw; }
        .blob2 { width: 45vw; height: 45vw; background: #8b5cf6; bottom: -15vh; right: -10vw; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 30px); } }
        .top-navbar { height: 65px; padding: 0 30px; display: flex; align-items: center; justify-content: space-between; background: var(--glass-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); z-index: 100; }
        .logo { font-size: 24px; font-weight: 900; background: var(--gradient-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .app-container { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }
        .left-panel { width: 300px; background: var(--glass-bg); backdrop-filter: blur(25px); border-radius: 20px; border: 1px solid var(--glass-border); display: flex; flex-direction: column; }
        .meeting-list { flex: 1; overflow-y: auto; padding: 15px; }
        .meeting-item { padding: 15px; border-radius: 12px; cursor: pointer; background: var(--item-bg); margin-bottom: 10px; transition: 0.2s; }
        .meeting-item.active { background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #8b5cf6; }
        .right-panel { flex: 1; background: var(--glass-bg); backdrop-filter: blur(25px); border-radius: 20px; border: 1px solid var(--glass-border); display: flex; flex-direction: column; }
        .workspace-header { padding: 25px 30px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .ws-title { font-size: 22px; font-weight: 800; margin: 0; }
        .tabs { display: flex; gap: 20px; margin-top: 20px; }
        .tab-btn { background: none; border: none; padding: 8px 0; font-weight: 700; color: var(--text-muted); cursor: pointer; position: relative; }
        .tab-btn.active { color: #7c3aed; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--gradient-main); }
        .workspace-content { flex: 1; padding: 30px; overflow-y: auto; }
        .transcript-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; position: relative; border: 1px solid #eee; }
        .spk-1::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: #3b82f6; border-radius: 15px 0 0 15px; }
        .spk-2::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: #8b5cf6; border-radius: 15px 0 0 15px; }
        .ts-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; color: var(--text-muted); font-weight: 600; }
        .summary-section h3 { margin-top: 0; font-size: 18px; }
        .summary-section p { line-height: 1.7; color: #444; }
    </style>
</head>
<body>
<div class="bg-mesh"><div class="blob blob1"></div><div class="blob blob2"></div></div>
<input type="file" id="audio-upload" style="display: none;" onchange="handleFileUpload(event)">
<header class="top-navbar">
    <div class="logo">AIgenda GPU</div>
    <button onclick="document.getElementById('audio-upload').click()" style="padding: 10px 20px; border-radius: 12px; background: var(--gradient-main); color: white; border: none; font-weight: 700; cursor: pointer;">+ 파일 분석</button>
</header>
<main class="app-container">
    <aside class="left-panel">
        <div style="padding: 20px; font-weight: 800; border-bottom: 1px solid #eee;">회의 목록</div>
        <div class="meeting-list" id="meeting-list"></div>
    </aside>
    <section class="right-panel">
        <div class="workspace-header">
            <h2 id="ws-title" class="ws-title">대기 중</h2>
            <div id="ws-meta" style="font-size: 13px; color: var(--text-muted); margin-top: 5px;">파일을 업로드해 주세요.</div>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('summary')">요약</button>
                <button class="tab-btn" onclick="switchTab('transcript')">기록</button>
            </div>
        </div>
        <div id="workspace-content" class="workspace-content"></div>
    </section>
</main>
<script>
    let currentId = '';
    let currentTab = 'summary';
    const data = {};

    async function handleFileUpload(event) {
        const file = event.target.files[0];
        if(!file) return;
        const tempId = 'l_' + Date.now();
        data[tempId] = { title: file.name, meta: "GPU 분석 중...", summary: "분석 중입니다...", bullets: [], diarized: [] };
        currentId = tempId;
        renderList();
        
        const fd = new FormData();
        fd.append("file", file);
        try {
            const res = await fetch("/upload", { method: "POST", body: fd });
            const result = await res.json();
            const finalId = 'm_' + Date.now();
            delete data[tempId];
            data[finalId] = { title: file.name, meta: "분석 완료", ...result };
            currentId = finalId;
        } catch(e) { alert("GPU 분석 오류"); delete data[tempId]; }
        finally { renderList(); updateWS(); }
    }

    function renderList() {
        const list = document.getElementById('meeting-list');
        list.innerHTML = Object.keys(data).reverse().map(id => `
            <div class="meeting-item ${id===currentId?'active':''}" onclick="select('${id}')">
                <div style="font-weight: 800;">${data[id].title}</div>
            </div>`).join('');
    }

    function select(id) { currentId = id; renderList(); updateWS(); }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(t==='summary'?'요약':'기록')));
        renderContent();
    }

    function updateWS() {
        const m = data[currentId];
        if(!m) return;
        document.getElementById('ws-title').innerText = m.title;
        document.getElementById('ws-meta').innerText = m.meta;
        renderContent();
    }

    function renderContent() {
        const c = document.getElementById('workspace-content');
        const m = data[currentId];
        if(!m) return;
        if(currentTab === 'summary') {
            c.innerHTML = `<div class="summary-section"><h3>📌 핵심 요약</h3><p>${m.summary}</p><h3>✅ 주요 결정</h3><ul>${m.bullets.map(b=>`<li>${b}</li>`).join('')}</ul></div>`;
        } else {
            c.innerHTML = `<div class="transcript-container">${m.diarized.map(d => `
                <div class="transcript-card spk-${d.speaker.includes('1')?'1':'2'}">
                    <div class="ts-header"><span>${d.speaker}</span><span>${d.time}</span></div>
                    <div class="ts-text">${d.text}</div>
                </div>`).join('')}</div>`;
        }
    }
</script>
</body>
</html>
